name: Deploy GameSet (Docker)

# GitHub Repository의 main 브랜치에 코드 Push되면 GitHub Actions Workflow 자동 실행
# 수동 배포 과정 없이 코드 변경 사항이 자동으로 빌드 및 배포 프로세스로 이어질 수 있도록
on:
  push:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Spring Boot Backend 프로젝트를 Docker 이미지로 빌드 후 Docker Hub에 업로드
      # EC2 서버에서 소스 코드를 빌드하지 않고 Docker Hub에 저장된 이미지를 다운로드
      - name: Build Backend Docker Image
        run: |
          docker build -t gamjachoi/game-set-backend:latest ./game_set_back

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}"
          | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Backend Image
        run: docker push gamjachoi/game-set-backend:latest

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}"
          | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # React Frontend 이미지를 생성 시 build-arg를 사용하여 운영 환경 API 서버 주소를 주입
      # 개발 환경과 운영 환경에 서로 다른 API 주소 사용 가능
      # 환경별 설정을 유연하게 관리할 수 있도록 구성
      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg VITE_BACKSERVER=https://d2uftzitv8h5w8.cloudfront.net/api \
            -t gamjachoi/game-set-frontend:latest ./game_set_front

      - name: Push Frontend Image
        run: docker push gamjachoi/game-set-frontend:latest

  deploy:
    # 배포 작업은 Frontend와 Backend 이미지 생성 및 업로드가 모두 성공한 이후 실행되게 의존성을 설정
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          # Docker Hub에 업로드된 최신 이미지를 EC2 서버에서 자동으로 다운로드 후 컨테이너 재생성
          script: |
            cd ~/game_set_project
            docker compose pull
            docker compose up -d
