name: Deploy GameSet (Docker)

on:
  push:
    branches:
      - main

jobs:
  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Backend Docker Image
        run: |
          docker build -t gamjachoi/game-set-backend:latest ./game_set_back

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Backend Image
        run: docker push gamjachoi/game-set-backend:latest

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Frontend Image
        run: |
          docker build \
            --build-arg VITE_BACKSERVER=http://52.78.171.157:8080/api \
            -t gamjachoi/game-set-frontend:latest ./game_set_front

      - name: Push Frontend Image
        run: docker push gamjachoi/game-set-frontend:latest

      - name: Create env file
        run: |
          echo "VITE_BACKSERVER=${{ vars.VITE_BACKSERVER }}" > .env

  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/game_set_project
            docker compose pull
            docker compose up -d
