# Production profile

server.servlet.context-path=/api
server.port=${SERVER_PORT:8080}

spring.application.name=game_set_back


# ===============================
# DataSource (MySQL RDS)
# ===============================

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}


# ===============================
# JPA
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ===============================
# Email
# ===============================

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# ===============================
# JWT
# ===============================

jwt.secret=${JWT_SECRET}


# ===============================
# Google OAuth2
# ===============================

spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

logging.level.org.springframework.security=DEBUG
server.forward-headers-strategy=framework
spring.security.oauth2.client.registration.google.redirect-uri=https://d2uftzitv8h5w8.cloudfront.net/api/login/oauth2/code/google

cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=ap-northeast-2

cloud.aws.s3.bucket=${AWS_BUCKET_NAME}


# ===============================
# 파일 크기 제한
# ===============================

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB